<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
            <button class="btn func" data-action="clear">AC</button>
            <button class="btn func" data-action="delete">&#9003;</button>
            <button class="btn func" data-action="percent">%</button>
            <button class="btn op" data-action="operator" data-value="/">&#247;</button>

            <button class="btn digit" data-action="digit" data-value="7">7</button>
            <button class="btn digit" data-action="digit" data-value="8">8</button>
            <button class="btn digit" data-action="digit" data-value="9">9</button>
            <button class="btn op" data-action="operator" data-value="*">&times;</button>

            <button class="btn digit" data-action="digit" data-value="4">4</button>
            <button class="btn digit" data-action="digit" data-value="5">5</button>
            <button class="btn digit" data-action="digit" data-value="6">6</button>
            <button class="btn op" data-action="operator" data-value="-">&minus;</button>

            <button class="btn digit" data-action="digit" data-value="1">1</button>
            <button class="btn digit" data-action="digit" data-value="2">2</button>
            <button class="btn digit" data-action="digit" data-value="3">3</button>
            <button class="btn op" data-action="operator" data-value="+">+</button>

            <button class="btn digit zero" data-action="digit" data-value="0">0</button>
            <button class="btn digit" data-action="decimal">.</button>
            <button class="btn equals" data-action="equals">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
